name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + quality + tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build --no-daemon --stacktrace

      - name: Javadoc
        run: ./gradlew javadoc --no-daemon --stacktrace

      - name: Build examples/paper-sample
        run: ./gradlew -p examples/paper-sample build --no-daemon --stacktrace

      - name: Build examples/velocity-sample
        run: ./gradlew -p examples/velocity-sample build --no-daemon --stacktrace

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: reports
          path: |
            **/build/reports/
            **/build/test-results/
          retention-days: 7
