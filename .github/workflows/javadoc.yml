name: Publish Javadoc

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Generate Javadoc
        run: ./gradlew javadoc

      - name: Aggregate Javadoc
        run: |
          mkdir -p _site
          cp -r command-core/build/docs/javadoc _site/core
          cp -r command-annotations/build/docs/javadoc _site/annotations
          cp -r command-paper/build/docs/javadoc _site/paper
          cp -r command-velocity/build/docs/javadoc _site/velocity
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><title>CommandFramework Javadoc</title></head>
          <body>
            <h1>CommandFramework Javadoc</h1>
            <ul>
              <li><a href="core/">command-core</a></li>
              <li><a href="annotations/">command-annotations</a></li>
              <li><a href="paper/">command-paper</a></li>
              <li><a href="velocity/">command-velocity</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
