name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (without v prefix)'
        required: true

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, publish and release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Derive version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            tag="${GITHUB_REF_NAME}"
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: ./gradlew build -Pversion=${{ steps.version.outputs.version }} --no-daemon --stacktrace

      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          ./gradlew publishMavenPublicationToGitHubPackagesRepository
          -Pversion=${{ steps.version.outputs.version }}
          --no-daemon

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            core/build/libs/*.jar
            paper/build/libs/*.jar
            velocity/build/libs/*.jar
          generate_release_notes: true
          fail_on_unmatched_files: true
