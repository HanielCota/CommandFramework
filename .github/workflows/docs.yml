name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build aggregated Javadoc
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Javadoc (all modules)
        run: ./gradlew javadoc --no-daemon

      - name: Assemble aggregated site
        run: |
          mkdir -p site
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>CommandFramework — Javadoc</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 720px; margin: 4rem auto; padding: 0 1rem; color: #24292f; }
              h1 { border-bottom: 1px solid #eaecef; padding-bottom: .3em; }
              a { color: #0969da; }
              .module { padding: 1rem; border: 1px solid #d0d7de; border-radius: 6px; margin: .5rem 0; }
              code { background: #f6f8fa; padding: .2em .4em; border-radius: 3px; }
            </style>
          </head>
          <body>
            <h1>CommandFramework Javadoc</h1>
            <p>Pick a module. The full source lives at <a href="https://github.com/HanielCota/CommandFramework">github.com/HanielCota/CommandFramework</a>.</p>
            <div class="module"><a href="./annotations/"><strong>annotations</strong></a> — <code>@Command</code>, <code>@Execute</code>, <code>@Arg</code>, <code>@Cooldown</code>, etc.</div>
            <div class="module"><a href="./core/"><strong>core</strong></a> — dispatcher, resolvers, managers, SPIs.</div>
            <div class="module"><a href="./paper/"><strong>paper</strong></a> — Paper adapter (<code>PaperCommandFramework</code>).</div>
            <div class="module"><a href="./velocity/"><strong>velocity</strong></a> — Velocity adapter (<code>VelocityCommandFramework</code>).</div>
            <div class="module"><a href="./core-testkit/"><strong>core-testkit</strong></a> — <code>CommandTestKit</code> for unit-testing commands.</div>
          </body>
          </html>
          HTML
          cp -r annotations/build/docs/javadoc site/annotations
          cp -r core/build/docs/javadoc site/core
          cp -r paper/build/docs/javadoc site/paper
          cp -r velocity/build/docs/javadoc site/velocity
          cp -r core-testkit/build/docs/javadoc site/core-testkit

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
